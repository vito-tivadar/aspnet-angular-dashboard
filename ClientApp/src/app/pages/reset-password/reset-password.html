<div class="flex min-h-screen items-center justify-center bg-bg0 px-4">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <!-- <span
        class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-orange text-xl font-bold text-white"
        >P</span
      > -->
      <h1 class="mt-4 text-2xl font-bold text-foreground">Reset password</h1>
      <p class="mt-1 text-sm text-muted">Enter your new password below</p>
    </div>
    <div class="rounded-2xl border border-border bg-surface-hover p-8 shadow-xl">
      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-foreground-secondary"
            >Email</label
          >
          <input
            id="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
            class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50"
          />
        </div>
        <div>
          <label for="newPassword" class="block text-sm font-medium text-foreground-secondary"
            >New Password</label
          >
          <input
            id="newPassword"
            type="password"
            [ngModel]="newPassword()"
            (ngModelChange)="newPassword.set($event)"
            name="newPassword"
            required
            class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50"
          />
        </div>
        @if (errorMessage()) {
          <div class="rounded-lg border border-red/20 bg-red/10 px-4 py-3 text-sm text-red">
            {{ errorMessage() }}
          </div>
        }
        <button
          type="submit"
          class="w-full rounded-lg bg-orange px-4 py-2.5 text-sm font-semibold text-white hover:bg-orange2 focus:outline-none focus:ring-1 focus:ring-orange/50 focus:ring-offset-2 transition-colors"
        >
          Reset password
        </button>
      </form>
      <p class="mt-6 text-center text-sm">
        <a routerLink="/login" class="text-muted hover:text-orange">← Back to Login</a>
      </p>
    </div>
  </div>
</div>
