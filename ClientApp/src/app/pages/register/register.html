<div class="flex min-h-screen items-center justify-center bg-bg0 px-4 py-10">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <!-- <span
        class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-orange text-xl font-bold text-white"
        >P</span
      > -->
      <h1 class="mt-4 text-2xl font-bold text-foreground">Create an account</h1>
      <p class="mt-1 text-sm text-muted">Get started with Portfolio v2</p>
    </div>

    <div class="rounded-2xl border border-border bg-surface-hover p-8 shadow-xl">
      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="firstName" class="block text-sm font-medium text-foreground-secondary"
              >First Name</label
            >
            <input
              id="firstName"
              type="text"
              [ngModel]="firstName()"
              (ngModelChange)="firstName.set($event)"
              name="firstName"
              class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50"
            />
          </div>
          <div>
            <label for="lastName" class="block text-sm font-medium text-foreground-secondary"
              >Last Name</label
            >
            <input
              id="lastName"
              type="text"
              [ngModel]="lastName()"
              (ngModelChange)="lastName.set($event)"
              name="lastName"
              class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50"
            />
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-foreground-secondary"
            >Email</label
          >
          <input
            id="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
            class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-foreground-secondary"
            >Password</label
          >
          <input
            id="password"
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            required
            class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50"
          />
        </div>

        @if (errorMessage()) {
          <div class="rounded-lg border border-red/20 bg-red/10 px-4 py-3 text-sm text-red">
            {{ errorMessage() }}
          </div>
        }
        @if (message()) {
          <div class="rounded-lg border border-green/20 bg-green/10 px-4 py-3 text-sm text-green">
            {{ message() }}
          </div>
        }

        <button
          type="submit"
          class="w-full rounded-lg bg-orange px-4 py-2.5 text-sm font-semibold text-white hover:bg-orange2 focus:outline-none focus:ring-1 focus:ring-orange/50 focus:ring-offset-2 transition-colors"
        >
          Create account
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-muted">
        Already have an account?
        <a routerLink="/login" class="font-medium text-orange hover:text-orange2">Sign in</a>
      </p>
    </div>
  </div>
</div>
