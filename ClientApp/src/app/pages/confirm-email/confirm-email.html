<div class="flex min-h-screen items-center justify-center bg-bg0 px-4">
 <div class="w-full max-w-md text-center">
 @if (message()) {
 <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-green/15 text-3xl mb-6">
  <i class="ti ti-check"></i>
 </div>
 <h1 class="text-2xl font-bold text-foreground">Email confirmed</h1>
 <div class="mt-3 rounded-lg border border-green/20 bg-green/10 px-4 py-3 text-sm text-green
">{{ message() }}</div>
 }
 @if (errorMessage()) {
 <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-red/15 text-3xl mb-6">
  <i class="ti ti-x"></i>
 </div>
 <h1 class="text-2xl font-bold text-foreground">Confirmation failed</h1>
 <div class="mt-3 rounded-lg border border-red/20 bg-red/10 px-4 py-3 text-sm text-red
">{{ errorMessage() }}</div>
 }
 <a routerLink="/login"
 class="mt-6 inline-flex items-center gap-2 rounded-lg bg-orange px-5 py-2.5 text-sm font-semibold text-white
 hover:bg-orange2 transition-colors">
 Go to Login
 </a>
 </div>
</div>
