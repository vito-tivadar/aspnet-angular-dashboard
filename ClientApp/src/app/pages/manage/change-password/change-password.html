<div class="max-w-xl">
 <div class="rounded-xl border border-border bg-surface-hover p-6 shadow-sm">
 <h2 class="mb-5 text-lg font-semibold text-foreground">Change Password</h2>
 <form (ngSubmit)="onSubmit()" class="space-y-4">
 <div>
 <label for="oldPassword" class="block text-sm font-medium text-foreground-secondary">Current Password</label>
 <input id="oldPassword" type="password" [ngModel]="oldPassword()" (ngModelChange)="oldPassword.set($event)" name="oldPassword" required
 class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground
 focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50
" />
 </div>
 <div>
 <label for="newPassword" class="block text-sm font-medium text-foreground-secondary">New Password</label>
 <input id="newPassword" type="password" [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)" name="newPassword" required
 class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground
 focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50
" />
 </div>
 <div>
 <label for="confirmPassword" class="block text-sm font-medium text-foreground-secondary">Confirm New Password</label>
 <input id="confirmPassword" type="password" [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" required
 class="mt-1 w-full rounded-lg border border-border bg-surface-hover px-3 py-2.5 text-sm text-foreground
 focus:border-orange/50 focus:outline-none focus:ring-1 focus:ring-orange/50
" />
 </div>
 @if (message()) {
 <div class="rounded-lg border border-green/20 bg-green/10 px-4 py-3 text-sm text-green
">{{ message() }}</div>
 }
 @if (errorMessage()) {
 <div class="rounded-lg border border-red/20 bg-red/10 px-4 py-3 text-sm text-red
">{{ errorMessage() }}</div>
 }
 <div class="pt-1">
 <button type="submit"
 class="rounded-lg bg-orange px-5 py-2.5 text-sm font-semibold text-white
 hover:bg-orange2 focus:outline-none focus:ring-1 focus:ring-orange/50 focus:ring-offset-2
 transition-colors">
 Update password
 </button>
 </div>
 </form>
 </div>
</div>
